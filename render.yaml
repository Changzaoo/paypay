services:
  - type: web
    name: flow-core
    runtime: node
    rootDir: backend
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: FRONTEND_PUBLIC_URL
        value: https://paypay-ivory.vercel.app
      - key: BACKEND_PUBLIC_URL
        value: https://paypay-4836.onrender.com
      - key: TREASURY_JOB_SECRET
        sync: false
      - key: TREASURY_DEFAULT_MNEMONIC
        sync: false
      - key: TREASURY_KEY_MAIN
        sync: false
      - key: FLOW_INTERMEDIATE_COIN
        value: BTC
      - key: FLOW_INTERMEDIATE_NETWORK
        value: liquid
      - key: FLOW_INTERMEDIATE_LABEL
        value: LBTC Liquid
      - key: SIDESWAP_EXECUTOR_URL
        sync: false
      - key: SIDESWAP_EXECUTOR_SECRET
        sync: false
      - key: LIQUID_AUTO_SEND
        value: false
      - key: LIQUID_RPC_URL
        sync: false
      - key: LIQUID_RPC_USER
        sync: false
      - key: LIQUID_RPC_PASSWORD
        sync: false
      - key: LIQUID_RPC_WALLET
        sync: false
