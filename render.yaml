services:
  - type: web
    name: flow-core
    runtime: node
    rootDir: backend
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: FRONTEND_PUBLIC_URL
        value: https://paypay-ivory.vercel.app
      - key: BACKEND_PUBLIC_URL
        value: https://paypay-4836.onrender.com
